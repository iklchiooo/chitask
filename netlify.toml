# ── Build settings ───────────────────────────────────────────────
[build]
  publish = "."
  functions = "netlify/functions"

# ── Node bundler untuk semua functions ───────────────────────────
[functions]
  node_bundler = "esbuild"

# ── Scheduled Function: cek reminder tiap menit ──────────────────
[functions."send-reminders"]
  schedule = "* * * * *"

# ── Headers ──────────────────────────────────────────────────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Service-Worker-Allowed = "/"
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    # Tidak pakai content-hash di nama file, jadi tidak boleh immutable.
    # max-age=86400: browser boleh cache 1 hari, setelah itu harus revalidate.
    # Ini mencegah user terjebak di JS versi lama setelah deploy baru.
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    # Referrer policy untuk keamanan dan kompatibilitas OAuth Firebase
    Referrer-Policy = "strict-origin-when-cross-origin"
