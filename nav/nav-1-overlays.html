<!-- ================================================================ -->
<!--  NAV 1: OVERLAYS (Mobile)                                         -->
<!--  Berisi: sidebar-overlay, more-overlay, more-panel, subdrawer-overlay -->
<!--  Hapus file ini jika tidak butuh overlay gelap di mobile           -->
<!-- ================================================================ -->

<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>

<!-- Mobile More Panel overlay -->
<div class="more-overlay" id="moreOverlay" onclick="closeMorePanel()"></div>

<!-- Mobile More Panel -->
<div class="more-panel" id="morePanel">
  <div style="width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 14px"></div>
  <div class="more-panel-grid" id="morePanelGrid"></div>
</div>

<!-- Sub-drawer overlays (mobile) -->
<div class="subdrawer-overlay" id="subdrawerOverlay" onclick="closeSubDrawer()"></div>
